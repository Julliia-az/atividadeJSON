<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Julia Gabrielly Azevedo" />    
    <title>Catálogo de Entretenimento</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        :root {
        --UmberBrown: #8c6046;
        --AntiqueParchment: #f1e4cc;
        --Rosewood: #96584e;
        --SageOlive: #798165;
        --InkBlack: #2c2725;
      }


        body {
            background: var(--AntiqueParchment);
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            color: var(--InkBlack);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        p{
            text-align: center;
            margin-bottom: 40px;
            color: var(--SageOlive);
            font-size: 16px;
        }

        .categoria {
            margin-bottom: 40px;
        }

        .categoria h2 {
            margin-bottom: 15px;
            color: var(--InkBlack);
            border-left: 5px solid var(--UmberBrown);
            padding-left: 10px;
        }

        .lista {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--Rosewood);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            margin-bottom: 8px;
            color: var(--AntiqueParchment);
        }

        .card p {
            color: var(--AntiqueParchment);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Catálogo</h1>
    <p>Alguns dos meus títulos favoritos:</p>

    <div id="conteudo"></div>

    <script>
        const dados = {
            filmes: [
                { nome: "Interestelar" },
                { nome: "O Diabo Veste Prada" },
                { nome: "Interestelar" },
                { nome: "Enola Holmes" },
                { nome: "O Jogo do Amor - ''Ódio''" },
                { nome: "Frankenstein" },
                { nome: "O Mundo Depois de Nós" },
                { nome: "Titanic" },
                { nome: "Batalhão 6888" },
                { nome: "Não Olhe para Cima" }
            ],
            series: [
                { nome: "As Telefonistas" },
                { nome: "O Gambito da Rainha" },
                { nome: "Stranger Things" },
                { nome: "The Office" },
                { nome: "Gossip Girl" },
                { nome: "Gilmore Girls" },
                { nome: "Downton Abbey" },
                { nome: "Sherlock" },
                { nome: "Emergência Radioativa" },
                { nome: "Fallout" }
            ],
            livros: [
                { nome: "Noites Brancas - F. Dostoiévski" },
                { nome: "Crime e Castigo - F. Dostoiévski" },
                { nome: "É Assim que Acaba - Colleen Hoover" },
                { nome: "Todas as suas (im)perfeições - Colleen Hoover" },
                { nome: "As mil partes do meu coração - Colleen Hoover" },
                { nome: "A Empregada - Freida McFadden" },
                { nome: "Nunca minta - Freida McFadden" },
                { nome: "A Beira da Loucura - B. A. Paris" },
                { nome: "A Biblioteca da Meia-Noite - Matt Haig" },
                { nome: "A paciente silenciosa - Alex Michaelides" }

            ]
        };

        const container = document.getElementById("conteudo");

        Object.entries(dados).forEach(([categoria, itens]) => {
            const secao = document.createElement("section");
            secao.className = "categoria";

            secao.innerHTML = `
                <h2>${categoria.charAt(0).toUpperCase() + categoria.slice(1)}</h2>
                <div class="lista">
                    ${itens.map(item => `
                        <div class="card">
                            <h3>${item.nome}</h3>
                            <p>Categoria: ${categoria}</p>
                        </div>
                    `).join("")}
                </div>
            `;

            container.appendChild(secao);
        });
    </script>

</body>
</html>
